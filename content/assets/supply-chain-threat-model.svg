<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc"><title id="title">Secure software supply chain threat model</title><desc id="desc">Delivery stages with threats above and controls below each trust boundary.</desc><defs><linearGradient id="b" x2="1" y2="1"><stop stop-color="#10102a"/><stop offset="1" stop-color="#071b23"/></linearGradient><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0l8 4-8 4z" fill="#67e8f9"/></marker></defs><rect width="1200" height="560" rx="32" fill="url(#b)"/><text x="55" y="56" fill="#f8fafc" font-family="Inter,Arial" font-size="28" font-weight="700">Secure software supply chain — threat and control map</text><text x="55" y="85" fill="#94a3b8" font-family="Inter,Arial" font-size="14">Every arrow crosses a trust boundary; every artifact must be identifiable and verifiable.</text><g font-family="Inter,Arial" text-anchor="middle"><g fill="#172554" stroke="#60a5fa"><rect x="45" y="210" width="170" height="105" rx="18"/><text x="130" y="254" fill="#dbeafe" font-size="17" font-weight="700">Source</text><text x="130" y="281" fill="#93c5fd" font-size="13">protected branch</text></g><g fill="#3b1d45" stroke="#f472b6"><rect x="280" y="210" width="170" height="105" rx="18"/><text x="365" y="254" fill="#fce7f3" font-size="17" font-weight="700">Build</text><text x="365" y="281" fill="#f9a8d4" font-size="13">ephemeral runner</text></g><g fill="#442b09" stroke="#fbbf24"><rect x="515" y="210" width="170" height="105" rx="18"/><text x="600" y="254" fill="#fef3c7" font-size="17" font-weight="700">Artifact</text><text x="600" y="281" fill="#fcd34d" font-size="13">digest + SBOM</text></g><g fill="#123b36" stroke="#34d399"><rect x="750" y="210" width="170" height="105" rx="18"/><text x="835" y="254" fill="#d1fae5" font-size="17" font-weight="700">Admission</text><text x="835" y="281" fill="#6ee7b7" font-size="13">verify policy</text></g><g fill="#312e55" stroke="#a78bfa"><rect x="985" y="210" width="170" height="105" rx="18"/><text x="1070" y="254" fill="#ede9fe" font-size="17" font-weight="700">Runtime</text><text x="1070" y="281" fill="#c4b5fd" font-size="13">observe + respond</text></g></g><g stroke="#67e8f9" stroke-width="3" marker-end="url(#m)"><path d="M215 262h62"/><path d="M450 262h62"/><path d="M685 262h62"/><path d="M920 262h62"/></g><g font-family="Inter,Arial" text-anchor="middle"><g fill="#fecaca"><text x="130" y="155" font-size="13">stolen token · malicious PR</text><text x="365" y="135" font-size="13">poisoned dependency · runner escape</text><text x="600" y="155" font-size="13">tag replacement · registry tampering</text><text x="835" y="135" font-size="13">policy bypass · unsigned image</text><text x="1070" y="155" font-size="13">drift · secret theft · exploit</text></g><g fill="#a7f3d0"><text x="130" y="375" font-size="13">MFA · review · signed commit</text><text x="365" y="405" font-size="13">pin actions · OIDC · isolated build</text><text x="600" y="375" font-size="13">scan · SBOM · sign digest</text><text x="835" y="405" font-size="13">signature + provenance policy</text><text x="1070" y="375" font-size="13">least privilege · alerts · response</text></g></g><text x="600" y="500" text-anchor="middle" fill="#cbd5e1" font-family="Inter,Arial" font-size="16">Evidence chain: commit SHA → build identity → artifact digest → signature/provenance → deployed digest</text></svg>
