<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Production-minded AWS platform design</title><desc id="desc">Flow from developer through delivery controls into a multi-availability-zone Kubernetes platform with observability.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#12243e"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".3"/></filter><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0l8 4-8 4z" fill="#7dd3fc"/></marker></defs>
  <rect width="1200" height="620" rx="34" fill="url(#bg)"/><text x="55" y="58" fill="#f8fafc" font-family="Inter,Arial" font-size="28" font-weight="700">Production-minded AWS platform — design study</text><text x="55" y="88" fill="#94a3b8" font-family="Inter,Arial" font-size="15">Identity-first delivery · immutable artifacts · GitOps · multi-AZ runtime · observable operations</text>
  <g font-family="Inter,Arial" filter="url(#s)"><g fill="#172554" stroke="#60a5fa"><rect x="55" y="170" width="170" height="110" rx="18"/><text x="140" y="215" text-anchor="middle" fill="#bfdbfe" font-size="18" font-weight="700">Developer</text><text x="140" y="244" text-anchor="middle" fill="#93c5fd" font-size="14">PR + signed commit</text></g><g fill="#3b1d45" stroke="#f472b6"><rect x="290" y="135" width="220" height="180" rx="18"/><text x="400" y="176" text-anchor="middle" fill="#fbcfe8" font-size="18" font-weight="700">Delivery controls</text><text x="400" y="208" text-anchor="middle" fill="#f9a8d4" font-size="14">test · scan · SBOM</text><text x="400" y="234" text-anchor="middle" fill="#f9a8d4" font-size="14">sign · policy · approval</text><text x="400" y="272" text-anchor="middle" fill="#fbcfe8" font-size="13">OIDC: no static AWS key</text></g><g fill="#442b09" stroke="#fbbf24"><rect x="575" y="170" width="180" height="110" rx="18"/><text x="665" y="215" text-anchor="middle" fill="#fde68a" font-size="18" font-weight="700">ECR</text><text x="665" y="244" text-anchor="middle" fill="#fcd34d" font-size="14">signed immutable image</text></g><g fill="#123b36" stroke="#34d399"><rect x="820" y="125" width="325" height="205" rx="20"/><text x="982" y="165" text-anchor="middle" fill="#a7f3d0" font-size="18" font-weight="700">Private EKS runtime</text><rect x="850" y="195" width="125" height="90" rx="14" fill="#064e3b" stroke="#6ee7b7"/><rect x="990" y="195" width="125" height="90" rx="14" fill="#064e3b" stroke="#6ee7b7"/><text x="912" y="232" text-anchor="middle" fill="#d1fae5" font-size="14">AZ-a</text><text x="912" y="256" text-anchor="middle" fill="#6ee7b7" font-size="12">workloads</text><text x="1052" y="232" text-anchor="middle" fill="#d1fae5" font-size="14">AZ-b</text><text x="1052" y="256" text-anchor="middle" fill="#6ee7b7" font-size="12">workloads</text><text x="982" y="309" text-anchor="middle" fill="#a7f3d0" font-size="12">ALB · IRSA · NetworkPolicy · autoscaling</text></g></g>
  <g stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M225 225h62"/><path d="M510 225h62"/><path d="M755 225h62"/></g>
  <g font-family="Inter,Arial"><rect x="290" y="400" width="430" height="145" rx="20" fill="#29224c" stroke="#a78bfa"/><text x="505" y="440" text-anchor="middle" fill="#ddd6fe" font-size="18" font-weight="700">GitOps control plane</text><text x="505" y="473" text-anchor="middle" fill="#c4b5fd" font-size="14">desired state · drift detection · progressive rollout</text><text x="505" y="505" text-anchor="middle" fill="#c4b5fd" font-size="14">automatic health check · documented rollback</text><rect x="790" y="400" width="355" height="145" rx="20" fill="#3a2412" stroke="#fb923c"/><text x="967" y="440" text-anchor="middle" fill="#fed7aa" font-size="18" font-weight="700">Operational evidence</text><text x="967" y="473" text-anchor="middle" fill="#fdba74" font-size="14">metrics · logs · traces · SLOs</text><text x="967" y="505" text-anchor="middle" fill="#fdba74" font-size="14">alerts · runbooks · postmortems · cost</text></g><g stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M505 398V330h395"/><path d="M982 332v65"/></g>
</svg>
